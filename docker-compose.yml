version: "3.8"

services:
  bot:
    build: .
    container_name: telegram_bot
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-aisus}
      - DB_USER=${DB_USER:-aisus}
      - DB_PASS=${DB_PASS:-aisus}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
  db:
    image: mariadb:11
    restart: always
    environment:
      - MARIADB_DATABASE=${DB_NAME:-aisus}
      - MARIADB_USER=${DB_USER:-aisus}
      - MARIADB_PASSWORD=${DB_PASS:-aisus}
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
    healthcheck:
      test:
        [
          "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "127.0.0.1",
          "-p${DB_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
